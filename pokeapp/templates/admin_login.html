{% extends 'base.html' %}

{% block contenido %}
<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-5">
    <div class="surface p-4 p-md-5">
      <div class="d-flex align-items-start justify-content-between gap-3">
        <div>
          <h1 class="h4 mb-1">Login de Admin</h1>
          <p class="text-muted mb-0 small">Modo simulado (usuario: <code>admin</code> / clave: <code>admin</code>).</p>
        </div>
      </div>

      <hr class="my-4">

      <form method="post" class="vstack gap-3">
        {% csrf_token %}
        <div>
          <label for="username" class="form-label">Usuario</label>
          <input id="username" name="username" class="form-control" autocomplete="username" placeholder="admin" required>
        </div>
        <div>
          <label for="password" class="form-label">Contraseña</label>
          <input id="password" name="password" type="password" class="form-control" autocomplete="current-password" required>
        </div>

        <button class="btn btn-dark w-100" type="submit">Ingresar</button>

        <div class="d-flex justify-content-between align-items-center small">
          <a class="link-secondary" href="{% url 'index' %}">Volver al inicio</a>
          <a class="link-secondary" href="{% url 'registro' %}">Crear registro simulado</a>
        </div>
      </form>

      {% if request.session.is_fake_admin %}
        <div class="alert alert-info mt-4 mb-0" role="alert">
          Ya estás logueado. Puedes abrir el <a href="/admin/" class="alert-link">Admin de Django</a>.
        </div>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}
