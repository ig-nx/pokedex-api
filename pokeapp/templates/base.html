{% load static %} 
<!DOCTYPE html> 
<html lang='es'> 
<head> 
    <meta charset='UTF-8'> 
    <title>Pokédex</title> 
    <meta name='viewport' content='width=device-width, initial-scale=1'> 
    <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'> 
    <link rel='stylesheet' href='{% static "css/estilos.css" %}'> 
</head> 
<body class='bg-light fondo d-flex flex-column min-vh-100'> 
 
    <nav class='navbar navbar-dark bg-black border-bottom border-dark'> 
        <div class='container py-2'> 
            <div class='d-flex flex-column'> 
                <span class='navbar-brand fw-semibold mb-0'>Pokédex</span> 
            </div> 

            <div class='d-none d-md-flex align-items-center gap-3 text-white-50 small text-uppercase'> 
                <span>Inicio</span> 
                <span class='text-white-25'>•</span> 
                <span>Servicios</span> 
                <span class='text-white-25'>•</span> 
                <span>Contacto</span> 
            </div> 
        </div> 
    </nav> 
 
    <main class='container py-4 flex-grow-1'> 
        {% if messages %} 
            {% for message in messages %} 
                <div class='alert alert-success alert-dismissible fade show' role='alert'> 
                    {{ message }} 
                    <button type='button' class='btn-close' data-bs dismiss='alert'></button> 
                </div> 
            {% endfor %} 
        {% endif %} 
 
        {% block contenido %} 
        {% endblock %} 
    </main> 

    <footer class='bg-black text-white-50 border-top border-dark py-4 mt-auto'> 
        <div class='container d-flex flex-column flex-md-row justify-content-between align-items-center gap-2'> 
            <div class='small'>© {% now "Y" %} Pokédex — Pokémon fan app</div> 
            <div class='small'>Hecho por Ignacio con &hearts;</div> 
        </div> 
    </footer> 
 
    <script src='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js'></script> 
</body> 
</html>
