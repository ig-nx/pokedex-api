{% extends 'base.html' %}

{% block contenido %}
<div class="row justify-content-center">
  <div class="col-12 col-md-10 col-lg-6">
    <div class="surface p-4 p-md-5">
      <h1 class="h4 mb-1">Registro (simulado)</h1>
      <p class="text-muted mb-0 small">Esto no crea usuarios en la base de datos; es solo una maqueta.</p>

      <hr class="my-4">

      <form method="post" class="row g-3">
        {% csrf_token %}
        <div class="col-12">
          <label for="nombre" class="form-label">Nombre</label>
          <input id="nombre" name="nombre" class="form-control" autocomplete="name" required>
        </div>
        <div class="col-12">
          <label for="email" class="form-label">Email</label>
          <input id="email" name="email" type="email" class="form-control" autocomplete="email" required>
        </div>
        <div class="col-12 col-md-6">
          <label for="password" class="form-label">Contraseña</label>
          <input id="password" name="password" type="password" class="form-control" autocomplete="new-password" required>
        </div>
        <div class="col-12 col-md-6">
          <label for="password2" class="form-label">Repite contraseña</label>
          <input id="password2" name="password2" type="password" class="form-control" autocomplete="new-password" required>
        </div>

        <div class="col-12 d-grid gap-2 d-sm-flex justify-content-sm-between align-items-sm-center">
          <button class="btn btn-dark" type="submit">Crear registro</button>
          <a class="btn btn-outline-dark" href="{% url 'admin_login' %}">Ir al login de admin</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
