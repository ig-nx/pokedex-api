{% extends 'base.html' %} 
 
{% block contenido %} 

<div class="container mb-5">
    <div class="row">
        {% for p in datos %}
        <div class="col-12 col-sm-6 col-md-4 col-lg-3">
            <div class="card mb-5 shadow-sm border-0" style="width: 15rem;">
                <img src="{{ p.url_imagen }}" class="card-img-top" alt="{{ p.name }}" loading="lazy" decoding="async">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start gap-2">
                        <h5 class="card-title mb-1"> {{ p.name }}</h5>
                        {% if p.id %}
                        <span class="badge text-bg-dark">#{{ p.id|stringformat:"03d" }}</span>
                        {% endif %}
                    </div>
                    <p class="card-text text-muted small mb-0">Arte oficial (Shiny)</p>
                </div>
                <ul class="list-group list-group-flush">
                    <li class="list-group-item small">Fuente: PokeAPI</li>
                </ul>
                <div class="card-body">
                    <button type="button" class="btn btn-outline-dark btn-sm w-100" disabled>Detalles (próximamente)</button>
                </div>
                </div>
        </div>
        {% endfor %}
    </div>
</div>

{% endblock %}
